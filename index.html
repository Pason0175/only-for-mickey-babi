<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Only for you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="stage">
    <div class="envelope-wrap" id="envelopeWrap">
      <div class="glow"></div>
      <div class="envelope"></div>
      <div class="flap" id="flap"></div>
      <div class="seal">💌</div>
      <div class="letter" id="letter">
        <div>
          <h2 style="margin:0;font-family:'Playfair Display',serif;color:#be185d;">A special surprise</h2>
          <p style="margin:.5rem 0 0;color:#6b7280">Open me and go to the love page ✨</p>
        </div>
      </div>
    </div>
    <button class="cta" id="openBtn">Open letter</button>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/js/landing.js"></script>
</body>
</html>
