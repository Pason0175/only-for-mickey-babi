<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Kinh Đô</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="stars"></div>
  <main class="stage">
    <div class="envelope-wrap" id="envelopeWrap" aria-label="Open letter" role="button" tabindex="0">
      <div class="envelope"></div>
      <div class="center-fold"></div>
      <div class="flap" id="flap"></div>
      <div class="seal">❤️</div>
      <div class="letter" id="letter">
        <div>
          <h2>To My Babi</h2>
          <p>A surprise for Kinh Đô ✨</p>
        </div>
      </div>
      <div class="tap-hint" id="tapHint">Tap the letter</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/js/landing.js"></script>
</body>
</html>
