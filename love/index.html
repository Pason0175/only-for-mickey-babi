<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To my world, Kinh Đô</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="stars"></div>
  <main class="love-page">
    <article class="love-card" id="loveCard">
      <h1 class="love-title">To my babi</h1>
      <p class="love-sub">To my world, Kinh Đô</p>
      <p class="love-text">
        How could my world possibly remain in orbit, when you are the only sun that gives it light and life?
        Without your warmth, there is only the cold, silent dark. I love you.
      </p>
      <p class="love-sign">Nguyễn Đình Vĩnh Hưng will always love Đỗ Viết Kiên.</p>
    </article>

    <section class="field" aria-hidden="true">
      <div class="flower-root" id="flowerRoot">
        <svg viewBox="0 0 260 360" width="100%" height="100%">
          <defs>
            <radialGradient id="petalGrad" cx="50%" cy="50%" r="65%">
              <stop offset="0%" stop-color="#fffde7" />
              <stop offset="100%" stop-color="#ffffff" />
            </radialGradient>
          </defs>
          <g id="petals" transform="translate(130 95)">
            <ellipse class="petal" cx="0" cy="-52" rx="23" ry="54" fill="url(#petalGrad)" />
            <ellipse class="petal" cx="36" cy="-36" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(40)" />
            <ellipse class="petal" cx="52" cy="0" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(80)" />
            <ellipse class="petal" cx="36" cy="36" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(120)" />
            <ellipse class="petal" cx="0" cy="52" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(160)" />
            <ellipse class="petal" cx="-36" cy="36" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(200)" />
            <ellipse class="petal" cx="-52" cy="0" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(240)" />
            <ellipse class="petal" cx="-36" cy="-36" rx="23" ry="54" fill="url(#petalGrad)" transform="rotate(280)" />
            <circle cx="0" cy="0" r="24" fill="#facc15" stroke="#eab308" stroke-width="4" />
          </g>
          <rect x="124" y="116" width="12" height="186" rx="6" fill="#16a34a" />
          <ellipse cx="107" cy="220" rx="20" ry="10" fill="#22c55e" transform="rotate(-32 107 220)" />
          <ellipse cx="153" cy="258" rx="20" ry="10" fill="#22c55e" transform="rotate(32 153 258)" />
        </svg>
      </div>
      <div class="butterfly" id="butterfly"></div>
      <div class="grass" id="grass"></div>
    </section>
  </main>

  <button class="music-btn" id="musicBtn">🎵 Tap to play music</button>
  <div id="yt-player"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/love.js"></script>
</body>
</html>
