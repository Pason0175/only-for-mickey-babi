<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To my world, Kinh Đô</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <canvas id="galaxy"></canvas>

  <main class="love-page">
    <section class="love-copy" id="loveCopy">
      <h1>To my baby</h1>
      <h2>Kinh Đô</h2>
      <p>
        How could my world possibly remain in orbit, when you are the only sun that gives it light and life?
        Without your warmth, there is only the cold, silent dark.
      </p>
      <p class="love-sign">Nguyễn Đình Vĩnh Hưng will always love Đỗ Viết Kiên.</p>
    </section>

    <section class="scene-bottom" aria-hidden="true">
      <div class="flower-root" id="flowerRoot">
        <svg viewBox="0 0 300 520" width="100%" height="100%">
          <defs>
            <radialGradient id="petalGrad" cx="50%" cy="50%" r="70%">
              <stop offset="0%" stop-color="#fffef7" />
              <stop offset="100%" stop-color="#ffffff" />
            </radialGradient>
          </defs>
          <g id="petals" transform="translate(150 155)">
            <ellipse cx="0" cy="-70" rx="30" ry="74" fill="url(#petalGrad)" />
            <ellipse cx="48" cy="-48" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(45)" />
            <ellipse cx="70" cy="0" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(90)" />
            <ellipse cx="48" cy="48" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(135)" />
            <ellipse cx="0" cy="70" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(180)" />
            <ellipse cx="-48" cy="48" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(225)" />
            <ellipse cx="-70" cy="0" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(270)" />
            <ellipse cx="-48" cy="-48" rx="30" ry="74" fill="url(#petalGrad)" transform="rotate(315)" />
            <circle cx="0" cy="0" r="31" fill="#facc15" stroke="#eab308" stroke-width="5" />
          </g>
          <rect x="143" y="210" width="14" height="275" rx="7" fill="#16a34a" />
          <ellipse cx="122" cy="318" rx="24" ry="12" fill="#22c55e" transform="rotate(-33 122 318)" />
          <ellipse cx="178" cy="386" rx="24" ry="12" fill="#22c55e" transform="rotate(33 178 386)" />
        </svg>
      </div>

      <div class="butterfly" id="butterfly">
        <span class="wing left"></span>
        <span class="wing right"></span>
        <span class="body"></span>
      </div>

      <div class="grass" id="grass"></div>
    </section>
  </main>

  <button class="music-btn" id="musicBtn">🎵 Tap to play music</button>
  <div id="yt-player"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/love.js"></script>
</body>
</html>
