<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To my world, Kinh Đô</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Animated galaxy/star background canvas -->
  <canvas id="galaxy"></canvas>

  <!-- Main love page layout -->
  <main class="love-page">
    <!-- Text/copy section -->
    <section class="love-copy" id="loveCopy">
      <!-- Main title -->
      <h1>To my baby</h1>
      <!-- Recipient name -->
      <h2>Bông Bông</h2>
      <!-- Love message paragraph -->
      <p>
        I would move mountains just to keep your heart safe and your smile bright.
      </p>
    </section>

    <!-- Decorative animated bottom scene -->
    <section class="scene-bottom" aria-hidden="true">
      <!-- Flower illustration root -->
      <div class="flower-root" id="flowerRoot">
        <!-- SVG flower entity -->
        <svg viewBox="0 0 300 520" width="100%" height="100%">
          <!-- Reusable paint definitions -->
          <defs>
            <!-- Petal radial gradient -->
            <radialGradient id="petalGrad" cx="50%" cy="50%" r="70%">
              <stop offset="0%" stop-color="#fffef7" />
              <stop offset="100%" stop-color="#ffffff" />
            </radialGradient>
          </defs>

          <!-- Flower stem -->
          <rect x="143" y="180" width="14" height="380" rx="7" fill="#16a34a" />

          <!-- Flower head and petals group -->
          <g id="petals" transform="translate(150 178)">
            <!-- 8 petals -->
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(45)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(90)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(135)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(180)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(225)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(270)" />
            <ellipse cx="0" cy="-78" rx="28" ry="72" fill="url(#petalGrad)" transform="rotate(315)" />
            <!-- Flower center -->
            <circle cx="0" cy="0" r="32" fill="#facc15" stroke="#eab308" stroke-width="5" />
          </g>

          <!-- Left leaf -->
          <ellipse cx="122" cy="350" rx="24" ry="12" fill="#22c55e" transform="rotate(-33 122 350)" />
          <!-- Right leaf -->
          <ellipse cx="178" cy="388" rx="24" ry="12" fill="#22c55e" transform="rotate(33 178 388)" />
        </svg>
      </div>

      <!-- Butterfly entity -->
      <div class="butterfly" id="butterfly">
        <!-- Left wing -->
        <span class="wing left"></span>
        <!-- Right wing -->
        <span class="wing right"></span>
        <!-- Butterfly body -->
        <span class="body"></span>
      </div>

      <!-- Foreground grass strip -->
      <div class="grass" id="grass"></div>
    </section>
  </main>

  <!-- Background music audio source -->
  <audio id="bgMusic" preload="auto" loop autoplay playsinline>
    <source src="/assets/love-song.mp3" type="audio/mpeg" />
  </audio>

  <!-- GSAP animation library -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <!-- Love page behavior and animations -->
  <script src="/js/love.js"></script>
</body>
</html>
